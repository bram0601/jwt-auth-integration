<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - JWT Auth (Java)</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="navbar">
        <a href="dashboard.html" class="brand">JWT Auth <span>Java &bull; Struts 2</span></a>
        <nav>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="#" onclick="navigateToProducts(); return false;">Products (PHP)</a>
            <a href="#" onclick="doLogout(); return false;" class="logout">Logout</a>
        </nav>
    </div>
    <div class="container">
        <div class="card">
            <h2>Welcome, <span id="userName">User</span></h2>
            <p class="subtitle">Your profile from the Java Struts 2 authentication server.</p>
            <div id="alert" class="alert"></div>
            <dl class="profile-grid" id="profileData"><dt>Loading...</dt><dd></dd></dl>
        </div>
        <div class="card" style="margin-top: 1.5rem;">
            <h2>Quick Actions</h2>
            <p class="subtitle">Navigate to the PHP Products application.</p>
            <div style="display: flex; gap: 12px; margin-top: 1rem;">
                <a href="#" onclick="navigateToProducts(); return false;" class="btn btn-primary" style="width: auto;">
                    View Products (PHP App)
                </a>
            </div>
        </div>
    </div>
    <script src="assets/auth.js"></script>
    <script>
        checkHashToken();
        if (!getToken()) { window.location.href = 'login.html'; }

        (async function() {
            try {
                const data = await apiCall('GET', 'auth/me');
                const user = data.user;
                setUser(user);
                document.getElementById('userName').textContent = user.name;
                document.getElementById('profileData').innerHTML =
                    '<dt>ID</dt><dd>' + user.id + '</dd>' +
                    '<dt>Name</dt><dd>' + user.name + '</dd>' +
                    '<dt>Email</dt><dd>' + user.email + '</dd>' +
                    '<dt>Member since</dt><dd>' + new Date(user.created_at).toLocaleDateString() + '</dd>';
            } catch (err) {
                if (err.status === 401) { clearAuth(); window.location.href = 'login.html'; }
                else showAlert('alert', err.error || 'Failed to load profile', 'error');
            }
        })();
    </script>
</body>
</html>
