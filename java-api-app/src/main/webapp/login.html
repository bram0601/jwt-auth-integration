<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JWT Auth (Java)</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="navbar">
        <a href="login.html" class="brand">JWT Auth <span>Java &bull; Struts 2</span></a>
    </div>
    <div class="center-card">
        <div class="card">
            <h2>Sign In</h2>
            <p class="subtitle">Authentication powered by Java Struts 2.</p>
            <div id="alert" class="alert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
            </form>
            <p class="text-center mt-1">
                Don't have an account? <a href="register.html" class="text-link">Create one</a>
            </p>
        </div>
    </div>
    <script src="assets/auth.js"></script>
    <script>
        checkHashToken();
        if (getToken()) window.location.href = 'dashboard.html';
        if (window.location.hash === '#logged-out') history.replaceState(null, '', 'login.html');

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('alert');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const data = await apiCall('POST', 'auth/login', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });
                setToken(data.token);
                setUser(data.user);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showAlert('alert', err.error || 'Login failed', 'error');
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
